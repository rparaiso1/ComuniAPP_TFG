name: comuniapp
description: "ComuniApp - Aplicación de gestión de comunidades y urbanizaciones. Proyecto TFG DAM."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.4.0
  flutter: ^3.22.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cached_network_image: ^3.4.1
  equatable: ^2.0.7
  file_picker: ^8.1.6
  fl_chart: ^0.69.2
  flutter_dotenv: ^5.2.1
  flutter_local_notifications: ^18.0.1
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  http: ^1.2.0
  intl: 0.20.2
  open_filex: ^4.5.0
  path_provider: ^2.1.5
  pdf: ^3.11.2
  share_plus: ^10.1.4
  uuid: ^4.5.1
  timeago: ^3.7.0
  url_launcher: ^6.3.0
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

  # Assets
  assets:
    - .env
